# xcodegen spec — LearnOfChrist iOS app.
#
# Regenerate the .xcodeproj after editing this file:
#     cd ios && xcodegen generate
#
# We commit both project.yml AND the generated LearnOfChrist.xcodeproj so
# anyone can open the repo in Xcode without installing xcodegen first; the
# project.yml is the source of truth and the .xcodeproj is its build output.

name: LearnOfChrist

options:
  bundleIdPrefix: com.learnofchrist
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

# Swift Package Manager dependencies.
# GoogleSignIn-iOS drives the native Google Sign-In flow so Google's
# consent screen shows the iOS app's identity ("Learn of Christ") instead
# of the Supabase project URL. Returns an id_token we then exchange for a
# Supabase session via /auth/v1/token?grant_type=id_token (same pattern
# as Apple Sign In).
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  LearnOfChrist:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LearnOfChrist
        excludes:
          - "**/.DS_Store"
    # Full Info.plist — we can't use GENERATE_INFOPLIST_FILE because
    # CFBundleURLTypes (array of dicts for the learnofchrist:// deep-link
    # scheme) has no INFOPLIST_KEY_* equivalent. So we write the whole
    # plist here and xcodegen serializes it.
    info:
      path: LearnOfChrist/Info.plist
      properties:
        CFBundleDisplayName: "Learn of Christ"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.lifestyle"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.learnofchrist.app.deeplink
            CFBundleURLSchemes:
              - learnofchrist
          # Google Sign-In callback. The scheme is the REVERSED iOS
          # Client ID from Google Cloud Console — looks like
          # com.googleusercontent.apps.123456789-abc. GoogleSignIn-iOS
          # requires this for its OAuth callback.
          # PLACEHOLDER — replace with your iOS Client ID's reversed
          # form once it's created in Google Cloud Console.
          - CFBundleURLName: com.learnofchrist.app.google
            CFBundleURLSchemes:
              - com.googleusercontent.apps.PLACEHOLDER_IOS_CLIENT_ID
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.learnofchrist.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "14"
        TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Sign in with Apple capability. The entitlements file is the
        # source of truth; the matching capability still has to be
        # enabled for the bundle id at developer.apple.com (Certificates,
        # Identifiers & Profiles → Identifiers → com.learnofchrist.app →
        # Sign In with Apple).
        CODE_SIGN_ENTITLEMENTS: LearnOfChrist/LearnOfChrist.entitlements
    dependencies:
      - target: LearnOfChristWidgets
        embed: true
        codeSign: true
      - package: GoogleSignIn
        product: GoogleSignIn

  LearnOfChristWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LearnOfChristWidgets
        excludes:
          - "**/.DS_Store"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.learnofchrist.app.widgets
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "14"
        INFOPLIST_FILE: LearnOfChristWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: LearnOfChristWidgets/LearnOfChristWidgets.entitlements
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES

  LearnOfChristTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LearnOfChristTests
      # Bundle the shared scripture-ref test vectors as a resource so
      # ScriptureRefTests can load them via Bundle(for: Self.self).
      - path: ../docs/scripture-ref-test-vectors.json
        buildPhase: resources
      # Same idea for filterContent — RichContentFilterTests drives the
      # Swift filter through these vectors, and the TS twin
      # (src/data/study-chapters/__tests__/filter.test.ts) drives the
      # web filter through the identical set.
      - path: ../docs/rich-content-filter-test-vectors.json
        buildPhase: resources
    dependencies:
      - target: LearnOfChrist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.learnofchrist.app.Tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LearnOfChrist.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LearnOfChrist"
